name: stayline-local

services:
  api:
    image: stayline-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        PARTNER_PHASE: local
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  internal-api:
    image: stayline-internal-api:local
    build:
      context: .
      dockerfile: apps/internal-api/Dockerfile
      args:
        PARTNER_PHASE: local
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PUBLIC_API_ORIGIN: http://api:3000
      PORT: 3001
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: stayline-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        PARTNER_PHASE: local
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/web/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro

  admin:
    image: stayline-admin:local
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        PARTNER_PHASE: local
    ports:
      - '5174:80'
    depends_on:
      internal-api:
        condition: service_healthy
    volumes:
      - ./apps/admin/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
